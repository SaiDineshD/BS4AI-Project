# Data Configuration — Multi-Modal Liveness Detection
# 200 samples from each dataset

sampling:
  n_per_dataset: 400
  seed: 42

paths:
  ff_c23: "data/FaceForensics++_C23"
  asvspoof2019: "data/LA/LA"
  processed: "data/processed"
  sampling_indices: "data/sampling"
  # FairFace: images (e.g. fairface-img-margin125-trainval) + fairface_label_train.csv in same root
  fairface: "data/fairface-img-margin125-trainval"

fairface:
  train_csv: "fairface_label_train.csv"
  img_path_column: "file"
  race_column: "race"
  gender_column: "gender"
  age_column: "age"
  max_samples: 4000
  face_size: 224

ff_c23:
  compression: "c23"
  categories:
    real:
      - original
    fake:
      - Deepfakes
      - Face2Face
      - FaceSwap
      - NeuralTextures
      - FaceShifter
  csv_dir: "data/FaceForensics++_C23/csv"
  frame_extraction:
    num_frames: 8
    face_size: 224

asvspoof2019:
  scenario: "logical_access"
  splits:
    train:
      audio_dir: "ASVspoof2019_LA_train/flac"
      protocol: "ASVspoof2019_LA_cm_protocols/ASVspoof2019.LA.cm.train.trn.txt"
    dev:
      audio_dir: "ASVspoof2019_LA_dev/flac"
      protocol: "ASVspoof2019_LA_cm_protocols/ASVspoof2019.LA.cm.dev.trl.txt"
    eval:
      audio_dir: "ASVspoof2019_LA_eval/flac"
      protocol: "ASVspoof2019_LA_cm_protocols/ASVspoof2019.LA.cm.eval.trl.txt"
  audio:
    sample_rate: 16000
    feature: "lfcc"           # legacy label; see feature_type
    feature_type: "mfcc"       # lfcc | mfcc (MFCC per proposal; LFCC ASVspoof-style alternative)
    n_fft: 512
    n_lfcc: 60
    n_mfcc: 60
    max_length: 64000  # 4 seconds at 16kHz
